<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: ms-appdata: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *"> -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.3.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="fontawesome-free-6.5.1-web/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="icon" href="imagenes/logo.png" type="image/x-icon">
    <title>Notas</title>
</head>

<body class="bg-dark text-light">
    <div class="container-fluid filtro">
        <img src="" alt="">
        <div id="cabeza" class="mt-2 sticky-top border-bottom border-secondary rounded">
            <div class="row d-flex justify-content-center">
                <div class="col-lg-5 col-sm-10 m-2">
                        <div class="input-group">
                                <input type="text" class="form-control" placeholder="Buscar" aria-label="Buscar" aria-describedby="btn-buscar" id="buscar">
                                <button class="btn btn-light" type="button" data-bs-toggle="modal" data-bs-target="#modalConfiguraciones"><i class="fa-solid fa-gear" style="color: #030303;"></i></button>                        
                        </div>
                </div>
            </div>
        </div>
        <div id="cuerpo" class="mt-3">
            <div class="row row-cols-2 g-1" id="contenedorCartas">
                
            </div>
            <div class="row row-cols-1" id="contenedorAnuncio">

            </div>
        </div>
        <div id="pie" class="fixed-bottom pb-2 d-flex justify-content-end pe-3">
            <div class="btn-group dropstart">
                <button type="button" class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                    <i class="fa-solid fa-plus" style="color: #e63939;"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="containerModal">
        <div class="modal fade" id="modalAgregar" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalLabelAgregar" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content  bg-dark">
                    <div class="modal-header border-0">
                        <h1 class="modal-title fs-5" id="modalLabelAgregar">Agregar Nota</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form action="">
                            <div class="m-0">
                                <label for="tituloAgregar" class="form-label" hidden></label>
                                <input type="text" class="w-100 border-0 rounded-top nota" id="tituloAgregar" placeholder="Titulo">
                            </div>
                            <div class="m-0">
                                <label for="textoAgregar" class="form-label" hidden></label>
                                <textarea class="w-100 border-0 rounded-bottom nota" id="textoAgregar" rows="3" placeholder="Contenido..." required></textarea>
                            </div>
                            <div class="modal-footer border-0">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary" id="btnAgregar">Agregar</button>
                            </div>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
        <div class="modal fade" id="modalEditar" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalLabelEditar" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content  bg-dark">
                    <div class="modal-body">
                        <input type="text" hidden id="idEditar">
                        <input type="text" hidden id="colorEditar">
                        <form action="">
                            <div class="m-0">
                                <label for="tituloEditar" class="form-label" hidden></label>
                                <input type="text" class="w-100 border-0 rounded-top nota" id="tituloEditar" placeholder="Titulo">
                            </div>
                            <div class="m-0">
                                <label for="textoEditar" class="form-label" hidden></label>
                                <textarea class="w-100 border-0 rounded-bottom nota" id="textoEditar" rows="3" placeholder="Contenido..." required></textarea>
                            </div>
                            <div class="modal-footer border-0">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary" id="btnEditar">Guardar</button>
                            </div>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
        <div class="modal fade" id="modalTutorial" tabindex="-1" data-bs-backdrop="static" role="dialog" aria-labelledby="modalTutorialLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content bg-dark" id="modalTutorial-content">
                    <img src="img/icono.png" alt="Logo" class="img-thumbnail logoModal">
                    <div class="modal-body mt-2 me-5">
                        <div>
                            <h3 id="tutorialTitulo"></h3>
                            <p class="text-light" id="tutorialContenido"></p>
                            <img src="" alt="" id="tutorialImagen">
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <div class="form-check me-auto">
                            <input class="form-check-input" type="checkbox" id="btnConfirm">
                            <label class="form-check-label" for="btnConfirm">No mostrar más</label>
                        </div>
                        <button type="button" class="btn btn-secondary" id="btnAnterior">Atrás</button>
                        <button type="button" class="btn btn-primary" id="btnSiguiente">Siguiente</button>
                        <button type="button" class="btn btn-success" id="btnFin">Terminar</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="modalConfiguraciones" tabindex="-1" role="dialog" aria-labelledby="modalConfiguracionesLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content bg-dark" id="modalConfiguraciones-content">
                    <img src="img/icono.png" alt="Logo" class="img-thumbnail logoModal">
                    <div class="modal-body mt-2">
                        <div>
                            <h3 class="text-center">Configuraciones</h3>
                            <hr>
                            <ul type="none" class="text-center">
                                <li class="mt-2">
                                    <button type="button" data-bs-toggle="modal" data-bs-target="#modalTutorial">
                                        Tutorial
                                    </button>
                                </li>
                                <li class="mt-2">
                                    <button type="button" id="tomarFoto">
                                        Agregar Imagen de Fondo
                                    </button>
                                </li>
                                <li class="mt-2">
                                    <button type="button" class="d-none" id="quitarFondo">
                                        Quitar Fondo
                                    </button>
                                </li>
                                <li class="mt-2">
                                    <button type="button" data-bs-toggle="modal" data-bs-target="#modalContactos">
                                        Contactanos
                                    </button>
                                </li>
                            </ul>

                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <span>Creado por Josmar Diaz 2024</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="modalContactos" tabindex="-1" role="dialog" aria-labelledby="modalContactosLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content bg-dark" id="modalContactos-content">
                    <img src="img/icono.png" alt="Logo" class="img-thumbnail logoModal">
                    <div class="modal-body mt-2">
                        <div>
                            <h3 class="text-center">Contactanos</h3>
                            <hr>
                            <ul type="none" class="text-center">
                                <li class="mt-2">
                                    <i class="fa-brands fa-whatsapp me-2" style="color: #ffffff;"></i>
                                    <a href="https://wa.me/584149723784?text=%C2%A1Hola!%20Estoy%20usando%20tu%20app%20y%20me%20gustar%C3%ADa%20sugerirte...">WhatsApp</a>
                                </li>
                                <li class="mt-2">
                                    <i class="fa-solid fa-envelope me-2" style="color: #ffffff;"></i>
                                    <p>josmardiaz92@gmail.com</p>
                                </li>
                            </ul>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    

    <script src="bootstrap-5.3.2-dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/efectos.js"></script>
    <script src="js/notasBd.js"></script>
    <script src="js/tutorial.js"></script>
    <!-- <script src="cordova.js"></script> -->
</body>
</html>
